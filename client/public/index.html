<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <script>
      /* Keep in sync with ThemeContext.js (portiq-light-default-v1 + readStoredTheme) */
      (function () {
        try {
          var K = 'portiq-light-default-v1';
          if (!localStorage.getItem(K)) {
            localStorage.setItem(K, '1');
            localStorage.setItem('app-theme', 'light');
          }
          var t = localStorage.getItem('app-theme');
          document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : 'light');
        } catch (e) {}
      })();
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="PortIQ: transcripts, summaries, and tasks from every meeting. Starter ₹1,499 · Pro ₹2,999 · Business ₹9,999 / mo." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Meeting Assistant" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/assets/portiq-icon.png" />
    <link rel="shortcut icon" type="image/png" href="%PUBLIC_URL%/assets/portiq-icon.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/assets/portiq-logo.png" />
    <title>PortIQ Meeting Assistant</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
        overflow-y: auto;
      }
      #root {
        width: 100%;
        min-height: 100vh;
        overflow-x: hidden;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
